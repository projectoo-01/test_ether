    <script>

  const SUPABASE_URL = 'https://icdroraadrpeciabzqtq.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_PnszL8dHmLj1CgMbgnrooA_r6LyFtAz';

(async function() {
  const INTERVAL = 15000;

  const FALLBACKS = [
    { image_url: 'https://res.cloudinary.com/dio49rnxg/image/upload/v1738182406/Ore_Mi_The_-_Original_Sticker_yoqik9.png', name: 'Ọrẹ Mi', handle: '@ether' },
    { image_url: 'https://res.cloudinary.com/djmffrvpg/image/upload/v1772218142/Ore_Mi_The_-_Original_Sticker_amw4dy.png', name: 'Ọrẹ Mi', handle: '@ether' },
    { image_url: 'https://i.pinimg.com/736x/c9/d1/2f/c9d12f237a0c6b8f1e74bf1be9542107.jpg', name: 'Ọrẹ Mi', handle: '@ether' },
  ];

  let submissions = [];
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/submissions?select=*&order=created_at.desc,id.desc&limit=10`,
      {
        headers: {
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'apikey': SUPABASE_ANON_KEY,
        },
      }
    );
    if (res.ok) submissions = await res.json();
  } catch (e) {
    console.warn('Could not load submissions for carousel:', e);
  }

  const items = submissions.length > 0 ? submissions : FALLBACKS;

  const track = document.getElementById('carouselTrack');
  const personEl = document.getElementById('carouselPerson');
  const timerEl = document.getElementById('carouselTimer');

  let current = 0;
  let timer = null;

  items.forEach((item, i) => {
    const slide = document.createElement('div');
    slide.className = 'carousel-slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.src = item.image_url;
    img.alt = item.name || 'Ọrẹ Mi';
    img.loading = i === 0 ? 'eager' : 'lazy';
    slide.appendChild(img);
    track.appendChild(slide);
  });

  function updatePerson(item) {
    const handle = item.handle
      ? `<span>${item.handle.startsWith('@') ? item.handle : '@' + item.handle}</span>`
      : '';
    personEl.innerHTML = (item.name || '') + handle;
  }

  function goTo(n) {
    const slides = track.querySelectorAll('.carousel-slide');
    slides[current].classList.remove('active');
    current = (n + items.length) % items.length;
    slides[current].classList.add('active');
    updatePerson(items[current]);
    startTimer();
  }
  

  function startTimer() {
    timerEl.style.transition = 'none';
    timerEl.style.width = '0%';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        timerEl.style.transition = `width ${INTERVAL}ms linear`;
        timerEl.style.width = '100%';
      });
    });
    clearInterval(timer);
    timer = setInterval(() => goTo(current + 1), INTERVAL);
  }

  updatePerson(items[0]);
  startTimer();
})();

  (function() {
    const section = document.getElementById('videoSection');
    const video = document.getElementById('featureVideo');
    const btn = document.getElementById('videoPlayPause');
    const iconPlay = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');

    btn.addEventListener('click', () => {
      if (video.paused) {
        video.play();
        iconPlay.style.display = 'none';
        iconPause.style.display = 'block';
        section.classList.remove('paused');
      } else {
        video.pause();
        iconPlay.style.display = 'block';
        iconPause.style.display = 'none';
        section.classList.add('paused');
      }
    });
  })();

  document.addEventListener('DOMContentLoaded', () => {
    const forminit = new Forminit();
    const form = document.querySelector('.email-form');
    const statusEl = document.getElementById('form-status');

    if (window.location.search.includes('success=true')) {
      statusEl.textContent = "you're on the list.";
      window.history.replaceState({}, '', window.location.pathname);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = form.querySelector('.submit-btn');

      submitBtn.disabled = true;
      submitBtn.textContent = 'subscribing...';
      statusEl.textContent = '';
      statusEl.className = '';

      const { data, error } = await forminit.submit('x0vsqxq07e6', new FormData(form));

      if (error) {
        statusEl.textContent = error.message || 'something went wrong. please try again.';
        statusEl.className = 'error';
        submitBtn.disabled = false;
        submitBtn.textContent = 'subscribe';
        return;
      }

      statusEl.textContent = "you're on the list.";
      form.reset();
      submitBtn.disabled = false;
      submitBtn.textContent = 'subscribe';
    });
  });
    </script>
